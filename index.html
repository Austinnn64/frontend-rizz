    pointer-events: none;
    z-index: 1;

<script>
const shrek = document.getElementById('shrek');
const trailWords = ["Avni nigger", "AVNI NIGGER", "avni NIGGER 🐟", "Avni NIGGER🐠", "NIGGER NIGGER NIGGGER", "AVNI!!", "🐡 Avni NIGRO 🐡", "avni", "NIGGER"];

let x = window.innerWidth / 2;
let y = window.innerHeight / 2;
let vx = 4.5, vy = 3.2;
let scale = 1, scaleDir = 1, scaleSpeed = 0.02;
let isJumping = false, jumpVY = 0;
const gravity = 0.55;
let trailTimer = 0;

function spawnTrail(px, py) {
  const t = document.createElement('div');
  t.className = 'trail';
  t.textContent = trailWords[Math.floor(Math.random() * trailWords.length)];
  t.style.left = (px + (Math.random() - 0.5) * 60) + 'px';
  t.style.top  = (py + (Math.random() - 0.5) * 40) + 'px';
  const sz = 1.1 + Math.random() * 1.6;
  t.style.fontSize = sz + 'rem';
  const hue = 80 + Math.random() * 80;
  t.style.color = `hsl(${hue},100%,58%)`;
  t.style.textShadow = `0 0 10px hsl(${hue},100%,55%), 0 0 25px hsl(${hue},100%,40%)`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1500);
}

function doJump() {
  if (!isJumping) { isJumping = true; jumpVY = -(14 + Math.random()*8); }
}

function scheduleJump() {
  setTimeout(() => { doJump(); scheduleJump(); }, 1200 + Math.random()*1600);
}
scheduleJump();

function animate() {
  const W = window.innerWidth, H = window.innerHeight;
  const iW = shrek.offsetWidth || 220, iH = shrek.offsetHeight || 260;

  scale += scaleDir * scaleSpeed;
  if (scale > 1.75) { scale = 1.75; scaleDir = -1; }
  if (scale < 0.55) { scale = 0.55; scaleDir =  1; }

  if (isJumping) {
    jumpVY += gravity;
    y += jumpVY;
    if (y >= H - iH) { y = H - iH; isJumping = false; jumpVY = 0; }
  }

  x += vx;
  if (!isJumping) y += vy;

  if (x + iW >= W) { x = W - iW; vx = -(Math.abs(vx) + Math.random()*0.5); }
  if (x <= 0)       { x = 0;      vx =   Math.abs(vx) + Math.random()*0.5; }
  if (!isJumping) {
    if (y + iH >= H) { y = H - iH; vy = -Math.abs(vy); }
    if (y <= 0)       { y = 0;      vy =  Math.abs(vy); }
  }
  vx = Math.max(-10, Math.min(10, vx));
  vy = Math.max(-10, Math.min(10, vy));

  const fx = vx < 0 ? -1 : 1;
  shrek.style.left = x + 'px';
  shrek.style.top  = y + 'px';
  shrek.style.transform = `scaleX(${fx}) scale(${scale})`;

  trailTimer++;
  if (trailTimer >= 16) {
    spawnTrail(x + iW/2, y + iH/2);
    trailTimer = 0;
  }
  requestAnimationFrame(animate);
}
animate();

document.addEventListener('click',      doJump);
document.addEventListener('touchstart', doJump);
</script>
