<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The π Chase</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0a12;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  .title {
    font-family: 'Space Mono', monospace;
    color: #c9a86c;
    font-size: 0.85rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.8;
  }
  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #7a5c8a;
    font-size: 1rem;
    letter-spacing: 0.15em;
    margin-bottom: 24px;
    opacity: 0.6;
  }
  .canvas-wrapper {
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin: center center;
  }
  canvas { display: block; }
  .status {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #c9a86c;
    font-size: 1.3rem;
    height: 30px;
    margin-top: 18px;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 0.3s;
    text-align: center;
  }
  .status.show { opacity: 1; }
  .dist-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
  }
  .dist-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.5rem;
    color: #4a3a5a;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .bar-bg {
    width: 180px;
    height: 2px;
    background: #1a1025;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #7a5c8a, #c9a86c);
    transition: width 0.08s;
    position: relative;
  }
  .bar-fill::after {
    content: '';
    position: absolute;
    right: -4px; top: -3px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #c9a86c;
    box-shadow: 0 0 6px #c9a86c;
  }
  .dist-val {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    color: #c9a86c;
    width: 44px;
    text-align: right;
  }
</style>
</head>
<body>

<div class="title">π Chase</div>
<div class="subtitle">an irrational pursuit</div>

<div class="canvas-wrapper" id="wrapper">
  <canvas id="c" width="460" height="460"></canvas>
</div>

<div class="status" id="status"></div>

<div class="dist-row">
  <span class="dist-label">gap</span>
  <div class="bar-bg"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
  <span class="dist-val" id="distVal">—</span>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W/2, cy = H/2;
const wrapper = document.getElementById('wrapper');
const statusEl = document.getElementById('status');
const barFill = document.getElementById('barFill');
const distValEl = document.getElementById('distVal');

const piDigits = [3,1,4,1,5,9,2,6,5,3,5,8,9,7,9,3,2,3,8,4,6,2,6,4,3,3,8,3,2,7,9,5,0,2,8,8,4,1,9,7,1,6,9,3,9,9,3,7,5,1,0,5,8,2,0,9,7,4,9,4,4,5,9,2,3,0,7,8,1,6,4,0,6,2,8,6,2,0,8,9];
const R = 155;
const GF_ANGLE = -Math.PI / 2;

let t = 0;
let piIdx = 0;
let zoomScale = 1, zoomTarget = 1;
let lastClose = false;
let statusTO = null;
let msgIdx = 0;
const msgs = ["so close...", "almost...", "just a little more...", "never gonna happen 💀", "irrational gap 😔", "bridging π..."];

let dishantLegPhase = 0;

function getAngleDiff(time) {
  const period = 400;
  const phase = (time % period) / period;
  const base = 0.07 + 0.82 * Math.abs(Math.sin(phase * Math.PI));
  const noise = (piDigits[Math.floor(time / 6) % piDigits.length] / 9) * 0.025;
  return base + noise;
}

function lerp(a, b, t) { return a + (b-a)*t; }

function showStatus(msg) {
  statusEl.textContent = msg;
  statusEl.classList.add('show');
  clearTimeout(statusTO);
  statusTO = setTimeout(() => statusEl.classList.remove('show'), 1900);
}

// Draw stick figure
// x, y = feet/bottom position on orbit, figure drawn upward from circle
// color, glowColor
// legPhase = walking animation phase
// label, sublabel
// isWalking = true for Dishant, false for GF
function drawStick(x, y, color, glowColor, legPhase, label, sublabel, isWalking, facingLeft) {
  // Figure dimensions (upright, feet at bottom)
  const headR = 9;
  const torsoH = 20;
  const armH = 8; // from top of torso
  const armW = 13;
  const legH = 17;
  const legW = 7;

  // foot point is on the circle; figure stands up from there
  // "up" on the circle means radially outward from center
  // We'll just draw upright (screen-up) always for readability
  const fy = y; // feet y
  const kneesY = fy - legH;
  const hipsY = kneesY;
  const shouldersY = hipsY - torsoH;
  const headY = shouldersY - headR;
  const elbowsY = shouldersY + armH;

  // Glow beneath figure
  const glow = ctx.createRadialGradient(x, fy - torsoH/2, 0, x, fy - torsoH/2, 45);
  glow.addColorStop(0, glowColor.replace('1)', '0.2)'));
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(x, fy - torsoH/2, 45, 0, Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = color;
  ctx.lineWidth = 2.2;
  ctx.lineCap = 'round';

  if (isWalking) {
    // Walking legs
    const ls = Math.sin(legPhase) * 0.42;
    // Left leg
    ctx.beginPath();
    ctx.moveTo(x, hipsY);
    ctx.lineTo(x + Math.sin(ls) * legH * 0.8, fy - legH*(1-Math.abs(Math.sin(ls))*0.3));
    ctx.lineTo(x + Math.sin(ls) * legH * 1.1, fy);
    ctx.stroke();
    // Right leg
    ctx.beginPath();
    ctx.moveTo(x, hipsY);
    ctx.lineTo(x - Math.sin(ls) * legH * 0.8, fy - legH*(1-Math.abs(Math.sin(ls))*0.3));
    ctx.lineTo(x - Math.sin(ls) * legH * 1.1, fy);
    ctx.stroke();

    // Walking arms
    const as = Math.sin(legPhase + Math.PI) * 0.4;
    ctx.beginPath();
    ctx.moveTo(x, shouldersY + armH);
    ctx.lineTo(x + (facingLeft ? -1 : 1) * armW * 0.6 + Math.sin(as)*armW, elbowsY + armH);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, shouldersY + armH);
    ctx.lineTo(x + (facingLeft ? -1 : 1) * armW * 0.6 - Math.sin(as)*armW, elbowsY + armH);
    ctx.stroke();
  } else {
    // Standing still (GF) — arms open wide
    ctx.beginPath();
    ctx.moveTo(x, hipsY);
    ctx.lineTo(x - legW, fy);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, hipsY);
    ctx.lineTo(x + legW, fy);
    ctx.stroke();
    // Arms outstretched
    ctx.beginPath();
    ctx.moveTo(x, shouldersY + armH);
    ctx.lineTo(x - armW - 5, shouldersY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, shouldersY + armH);
    ctx.lineTo(x + armW + 5, shouldersY);
    ctx.stroke();
  }

  // Torso
  ctx.beginPath();
  ctx.moveTo(x, shouldersY);
  ctx.lineTo(x, hipsY);
  ctx.stroke();

  // Head
  ctx.beginPath();
  ctx.arc(x, headY, headR, 0, Math.PI*2);
  ctx.stroke();

  // GF hair bow
  if (!isWalking) {
    ctx.beginPath();
    ctx.moveTo(x - 6, headY - headR + 2);
    ctx.quadraticCurveTo(x, headY - headR - 9, x + 6, headY - headR + 2);
    ctx.strokeStyle = glowColor.replace('1)', '0.7)');
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.2;
  }

  // Label above head
  const labelY = headY - headR - 7;
  ctx.font = 'bold 11px "Space Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = color;
  ctx.fillText(label, x, labelY);
  if (sublabel) {
    ctx.font = '8px "Space Mono", monospace';
    ctx.fillStyle = glowColor.replace('1)', '0.45)');
    ctx.fillText(sublabel, x, labelY - 12);
  }
}

function draw() {
  t++;
  piIdx++;

  const diff = getAngleDiff(t);
  const dishantAngle = GF_ANGLE + diff;

  const gfX = cx + R * Math.cos(GF_ANGLE);
  const gfY = cy + R * Math.sin(GF_ANGLE);
  const dX = cx + R * Math.cos(dishantAngle);
  const dY = cy + R * Math.sin(dishantAngle);

  const dist = Math.sqrt((gfX-dX)**2 + (gfY-dY)**2);

  // Leg speed proportional to how fast diff is changing
  const period = 400;
  const phase = (t % period) / period;
  const speed = Math.abs(Math.cos(phase * Math.PI)) * 0.08 + 0.01;
  dishantLegPhase += speed * 2.5;

  const isClose = diff < 0.22;
  if (isClose && !lastClose) {
    zoomTarget = 1.65;
    showStatus(msgs[msgIdx++ % msgs.length]);
  } else if (!isClose && lastClose) {
    zoomTarget = 1;
  }
  lastClose = isClose;
  zoomScale = lerp(zoomScale, zoomTarget, 0.05);
  wrapper.style.transform = `scale(${zoomScale})`;

  const normDist = Math.min(1, dist / (2 * R));
  barFill.style.width = `${(1 - normDist) * 100}%`;
  distValEl.textContent = Math.round(dist) + 'px';

  // ---- DRAW ----
  ctx.clearRect(0, 0, W, H);

  // Background glow
  const bgG = ctx.createRadialGradient(cx, cy, 0, cx, cy, 230);
  bgG.addColorStop(0, 'rgba(25,10,40,0.55)');
  bgG.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bgG;
  ctx.fillRect(0, 0, W, H);

  // Orbit ring
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(70,45,95,0.4)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 9]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // π in center
  ctx.font = 'italic bold 38px "Cormorant Garamond", serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(70,45,95,0.55)';
  ctx.fillText('π', cx, cy + 14);

  // Connecting dashed line between feet positions
  const lineA = isClose ? 0.45 : 0.1;
  ctx.save();
  ctx.setLineDash([5, 8]);
  const lg = ctx.createLinearGradient(dX, dY, gfX, gfY);
  lg.addColorStop(0, `rgba(201,168,108,${lineA})`);
  lg.addColorStop(1, `rgba(180,100,220,${lineA})`);
  ctx.strokeStyle = lg;
  ctx.lineWidth = isClose ? 1.5 : 0.7;
  ctx.beginPath();
  ctx.moveTo(dX, dY);
  ctx.lineTo(gfX, gfY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Proximity spark
  if (diff < 0.16) {
    const sa = (0.16 - diff) / 0.16;
    const mx = (dX + gfX) / 2, my = (dY + gfY) / 2 - 20;
    const sg = ctx.createRadialGradient(mx, my, 0, mx, my, 28);
    sg.addColorStop(0, `rgba(255,255,180,${sa * 0.65})`);
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.arc(mx, my, 28, 0, Math.PI*2);
    ctx.fill();
  }

  // Dishant faces toward GF (is GF to the left?)
  const facingLeft = gfX < dX;

  // Draw GF (purple, still)
  drawStick(gfX, gfY, '#d470ff', 'rgba(200,100,255,1)', 0, "Dishant's gf", "● still", false, false);

  // Draw Dishant (gold, walking)
  drawStick(dX, dY, '#f0c060', 'rgba(240,192,96,1)', dishantLegPhase, 'Dishant', '● chasing', true, facingLeft);

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
